<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1050" width="1500" height="1050">
  <!--
    BOOK OF VERSE — TEAM EDITION
    BOOK COVER: Full case spread layout with foil stamp positions

    Binding: BindTech Phoenix, Quote #80686R1
    Material: Arizona Bonded Leather (Goat emboss, Matte), Black
    Foil: Silver gloss
    Binding: Smyth-sewn, round back, 0.118" boards
    Pages: 488 (31 nested signatures)

    DIMENSIONS (all TBD pending mock-up):
      Trim size: 7" x 10"
      Board overhang: ~0.125" per side
      Board size: ~7.25" x 10.25"
      Spine width: ~1.3" estimated (confirm with mock-up)
      Full case spread: ~15.8" x 10.25"

    SCALE: 1" = 72px
  -->

  <defs>
    <style>
      .crop        { stroke: #000; stroke-width: 0.75; }
      .fold        { stroke: #000; stroke-width: 0.5; stroke-dasharray: 12,4,2,4; }
      .dim         { stroke: #d04040; stroke-width: 0.5; stroke-dasharray: 4,3; }
      .dim-text    { font-family: 'Segoe UI', Arial, sans-serif; font-size: 11px; fill: #d04040; }
      .heading     { font-family: Georgia, serif; font-size: 22px; fill: #222; font-weight: bold; }
      .subheading  { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #555; }
      .panel-label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; fill: #888; font-weight: bold; letter-spacing: 2px; }
      .note        { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #999; }
      .spec        { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #666; }
      .foil-label  { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #d04040; font-weight: bold; }
      .foil-desc   { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #d04040; }
      .callout-line { stroke: #d04040; stroke-width: 0.7; }
    </style>
  </defs>

  <rect width="1500" height="1050" fill="#f5f5f2"/>

  <!-- ==================== TITLE BLOCK ==================== -->
  <text x="750" y="36" text-anchor="middle" class="heading">Book of Verse — Team Edition: Book Cover Layout</text>
  <text x="750" y="56" text-anchor="middle" class="subheading">
    Arizona Bonded Leather (Goat, Matte, Black) · Silver Gloss Foil · Round Back · Smyth Sewn · 0.118" Boards
  </text>
  <text x="750" y="72" text-anchor="middle" class="note">
    All dimensions estimated — spine width and board overhang to be confirmed with mock-up. Scale: 1" = 72px
  </text>

  <!-- ==================== CASE SPREAD ==================== -->
  <!--
    Layout left-to-right:
      Turn-in (0.625") | Back Board (7.25") | Spine (1.3") | Front Board (7.25") | Turn-in (0.625")
    Total spread width: 0.625 + 7.25 + 1.3 + 7.25 + 0.625 = 17.05"
    Height: 0.625 + 10.25 + 0.625 = 11.5"

    At 72px/in:
      Turn-in: 45px
      Board: 522px
      Spine: 94px
      Full width: 1228px
      Full height: 828px

    Offset from left edge: (1500 - 1228) / 2 = 136px
    Offset from top: 95px
  -->

  <!-- Turn-in area (the leather that wraps around the boards) -->
  <rect x="136" y="95" width="1228" height="828" fill="#e0ddd8" stroke="#bbb" stroke-width="0.5" rx="2"/>
  <!-- Label turn-in -->
  <text x="158" y="510" class="note" transform="rotate(-90, 158, 510)">TURN-IN 0.625"</text>
  <text x="1342" y="510" class="note" transform="rotate(90, 1342, 510)">TURN-IN 0.625"</text>
  <text x="750" y="120" text-anchor="middle" class="note">TURN-IN 0.625"</text>
  <text x="750" y="910" text-anchor="middle" class="note">TURN-IN 0.625"</text>

  <!-- Back Board -->
  <rect x="181" y="140" width="522" height="738" fill="#1a1a1a" stroke="#000" stroke-width="1"/>

  <!-- Spine -->
  <rect x="703" y="140" width="94" height="738" fill="#141414" stroke="#000" stroke-width="1"/>

  <!-- Front Board -->
  <rect x="797" y="140" width="522" height="738" fill="#1a1a1a" stroke="#000" stroke-width="1"/>

  <!-- ==================== CROP / FOLD MARKS ==================== -->

  <!-- Back board corners -->
  <line x1="181" y1="120" x2="181" y2="135" class="crop"/>
  <line x1="161" y1="140" x2="176" y2="140" class="crop"/>
  <line x1="181" y1="883" x2="181" y2="898" class="crop"/>
  <line x1="161" y1="878" x2="176" y2="878" class="crop"/>
  <line x1="703" y1="120" x2="703" y2="135" class="crop"/>
  <line x1="703" y1="883" x2="703" y2="898" class="crop"/>

  <!-- Front board corners -->
  <line x1="797" y1="120" x2="797" y2="135" class="crop"/>
  <line x1="797" y1="883" x2="797" y2="898" class="crop"/>
  <line x1="1319" y1="120" x2="1319" y2="135" class="crop"/>
  <line x1="1324" y1="140" x2="1339" y2="140" class="crop"/>
  <line x1="1319" y1="883" x2="1319" y2="898" class="crop"/>
  <line x1="1324" y1="878" x2="1339" y2="878" class="crop"/>

  <!-- Spine fold lines -->
  <line x1="703" y1="140" x2="703" y2="878" class="fold" opacity="0.4"/>
  <line x1="797" y1="140" x2="797" y2="878" class="fold" opacity="0.4"/>

  <!-- ==================== PANEL LABELS ==================== -->
  <text x="442" y="870" text-anchor="middle" class="panel-label">BACK COVER</text>
  <text x="750" y="870" text-anchor="middle" class="panel-label" font-size="11">SPINE</text>
  <text x="1058" y="870" text-anchor="middle" class="panel-label">FRONT COVER</text>

  <!-- ==================== DIMENSION LINES ==================== -->
  <!-- Board widths along bottom -->
  <line x1="181" y1="935" x2="703" y2="935" class="dim"/>
  <text x="442" y="950" text-anchor="middle" class="dim-text">7.25" (board)</text>

  <line x1="703" y1="935" x2="797" y2="935" class="dim"/>
  <text x="750" y="950" text-anchor="middle" class="dim-text">~1.3"</text>
  <text x="750" y="963" text-anchor="middle" class="note">(TBD mock-up)</text>

  <line x1="797" y1="935" x2="1319" y2="935" class="dim"/>
  <text x="1058" y="950" text-anchor="middle" class="dim-text">7.25" (board)</text>

  <!-- Height along right side -->
  <line x1="1370" y1="140" x2="1370" y2="878" class="dim"/>
  <text x="1385" y="515" class="dim-text" transform="rotate(90, 1385, 515)">10.25" (board height)</text>

  <!-- Trim size reference -->
  <line x1="806" y1="149" x2="1310" y2="149" class="dim" opacity="0.4"/>
  <text x="1058" y="162" text-anchor="middle" class="note">7" trim inside boards</text>

  <!-- ==================== FOIL ART: FRONT COVER ==================== -->
  <!-- Front board area: x=797..1319, y=140..878 -->
  <!-- Center of front board: x=1058, y=509 -->

  <!-- V EMBLEM — 2.5" wide (180px), centered horizontally, upper third -->
  <!-- Upper third center: y = 140 + 738*0.3 = 361 → emblem centered around y=320 -->
  <g id="front-emblem">
    <path d="M 968,240 L 1007.6,240 L 1063.4,351.6 L 1108.4,265.2 L 1076,240 L 1148,240 L 1058,420 Z"
          fill="#c0c0c0" stroke="#a0a0a0" stroke-width="0.5"/>
  </g>

  <!-- TITLE: BOOK OF VERSE — centered below emblem -->
  <text x="1058" y="478" text-anchor="middle" fill="#c0c0c0"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="bold" letter-spacing="4">BOOK OF VERSE</text>

  <!-- SUBTITLE — centered below title -->
  <text x="1058" y="520" text-anchor="middle" fill="#c0c0c0" opacity="0.75"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="14" font-style="italic" letter-spacing="1">The Verse Programming Language</text>

  <!-- AUTHOR — centered below subtitle -->
  <text x="1058" y="550" text-anchor="middle" fill="#c0c0c0" opacity="0.55"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" letter-spacing="0.5">Documentation by the Verse Team — Epic Games</text>

  <!-- Foil element bounding boxes (dashed red) -->
  <rect x="968" y="235" width="180" height="190" fill="none" stroke="#d04040" stroke-width="0.6" stroke-dasharray="4,3"/>
  <rect x="842" y="452" width="432" height="42" fill="none" stroke="#d04040" stroke-width="0.6" stroke-dasharray="4,3"/>
  <rect x="870" y="500" width="376" height="58" fill="none" stroke="#d04040" stroke-width="0.6" stroke-dasharray="4,3"/>

  <!-- Front cover callout labels -->
  <line x1="1148" y1="320" x2="1195" y2="310" class="callout-line"/>
  <text x="1200" y="306" class="foil-label">V EMBLEM</text>
  <text x="1200" y="318" class="foil-desc">Silver foil, 2.5" wide</text>
  <text x="1200" y="330" class="foil-desc">Centered, upper third</text>

  <line x1="1274" y1="470" x2="1295" y2="470" class="callout-line"/>
  <text x="1200" y="455" class="foil-label">TITLE</text>
  <text x="1200" y="467" class="foil-desc">Silver foil, "BOOK OF VERSE"</text>

  <line x1="1246" y1="530" x2="1295" y2="540" class="callout-line"/>
  <text x="1200" y="543" class="foil-label">SUBTITLE + AUTHOR</text>
  <text x="1200" y="555" class="foil-desc">Silver foil, 2 lines</text>

  <!-- ==================== FOIL ART: SPINE ==================== -->
  <!-- Spine area: x=703..797, y=140..878. Center: x=750 -->

  <!-- V EMBLEM top (0.7" = 50px wide) -->
  <path d="M 725,185 L 736,185 L 751.5,216 L 764,192 L 755,185 L 775,185 L 750,235 Z"
        fill="#c0c0c0" stroke="#a0a0a0" stroke-width="0.3"/>
  <rect x="725" y="180" width="50" height="60" fill="none" stroke="#d04040" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- TITLE rotated 90° (read bottom-to-top, standard US convention) -->
  <g transform="translate(750, 509)">
    <text transform="rotate(-90)" x="0" y="5" text-anchor="middle" fill="#c0c0c0"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="15" font-weight="bold" letter-spacing="2">BOOK OF VERSE</text>
  </g>
  <rect x="735" y="385" width="30" height="248" fill="none" stroke="#d04040" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- V EMBLEM bottom (0.7" = 50px wide) -->
  <path d="M 725,785 L 736,785 L 751.5,816 L 764,792 L 755,785 L 775,785 L 750,835 Z"
        fill="#c0c0c0" stroke="#a0a0a0" stroke-width="0.3"/>
  <rect x="725" y="780" width="50" height="60" fill="none" stroke="#d04040" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Spine callout labels (left side) -->
  <line x1="723" y1="210" x2="155" y2="195" class="callout-line"/>
  <text x="135" y="192" text-anchor="end" class="foil-label">SPINE: V EMBLEM (top)</text>
  <text x="135" y="204" text-anchor="end" class="foil-desc">Silver foil, 0.7" wide</text>

  <line x1="733" y1="509" x2="155" y2="509" class="callout-line"/>
  <text x="135" y="506" text-anchor="end" class="foil-label">SPINE: TITLE</text>
  <text x="135" y="518" text-anchor="end" class="foil-desc">"BOOK OF VERSE" rotated</text>
  <text x="135" y="530" text-anchor="end" class="foil-desc">Read bottom-to-top</text>

  <line x1="723" y1="810" x2="155" y2="825" class="callout-line"/>
  <text x="135" y="822" text-anchor="end" class="foil-label">SPINE: V EMBLEM (bottom)</text>
  <text x="135" y="834" text-anchor="end" class="foil-desc">Silver foil, 0.7" wide</text>

  <!-- ==================== BACK COVER ==================== -->
  <text x="442" y="505" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="13">NO FOIL</text>
  <text x="442" y="522" text-anchor="middle" class="note">(plain black leather)</text>

  <!-- ==================== SPECS BOX ==================== -->
  <rect x="50" y="975" width="1400" height="62" rx="5" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="70" y="995" class="spec" font-weight="bold">Materials:</text>
  <text x="150" y="995" class="spec">Arizona Bonded Leather · Goat emboss · Matte finish · Black</text>
  <text x="70" y="1012" class="spec" font-weight="bold">Binding:</text>
  <text x="150" y="1012" class="spec">Smyth-sewn · 31 sigs (nested) · Round back · 0.118" boards · Square corners · 100# White endpapers</text>
  <text x="70" y="1029" class="spec" font-weight="bold">Finishing:</text>
  <text x="150" y="1029" class="spec">Silver gloss foil (front + spine) · Headbands (color TBD) · 2 ribbons 1/4" (color TBD) · Edge paint 3 sides (color TBD) · Shrink wrap individual</text>

  <text x="1430" y="1029" text-anchor="end" class="note">BindTech Phoenix · Quote #80686R1 · 100 copies</text>

</svg>
